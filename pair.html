<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusée MD Pair</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #cbd5f5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4f46e5;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }

    .code {
      color: #22c55e;
      font-size: 18px;
      cursor: pointer;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Fusée MD Pair</h2>
    <p>Enter your WhatsApp number with country code</p>

    <input type="text" id="number" placeholder="+509XXXXXXXX">

    <button id="submit">Generate Code</button>

    <div id="result"></div>

    <div class="footer">Powered by Weed-Tech</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

  <script>
    const btn = document.getElementById("submit");
    const input = document.getElementById("number");
    const result = document.getElementById("result");

    function copyCode(text) {
      navigator.clipboard.writeText(text);
      result.innerHTML = "✅ Copied!";
    }

    btn.addEventListener("click", async () => {
      let num = input.value.replace(/[^0-9]/g, "");

      if (!num || num.length < 10) {
        result.innerHTML = "❗ Invalid number";
        return;
      }

      result.innerHTML = "⏳ Generating code...";

      try {
        let { data } = await axios(`/code?number=${num}`);
        let code = data.code || "Error";

        result.innerHTML = `
          <div class="code" onclick="copyCode('${code}')">
            CODE: ${code}
          </div>
          <small>(Tap to copy)</small>
        `;

      } catch (err) {
        result.innerHTML = "❌ Server error";
      }
    });
  </script>

</body>
</html>
