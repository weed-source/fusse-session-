<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fusée-MD Session 3</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "url": "https://railway.app",
    "logo": "https://files.catbox.moe/fi2gjj.jpg"
  }

  <style>
    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: Arial, sans-serif;
    }

    .button-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    h3 {
      margin-top: -40px;
      opacity: 0;
      animation: fadeIn 3s forwards;
    }

    .button {
      width: 160px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0px 15px;
      border-radius: 10px;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
      background: linear-gradient(0deg, #000, #272727);
      position: relative;
      transition: 0.2s;
    }

    .button:before,
    .button:after {
      content: '';
      position: absolute;
      left: -2px;
      top: -2px;
      border-radius: 10px;
      background: linear-gradient(45deg, #48ff00, #15ff00, #000000, #000000, #ff0000);
      background-size: 400%;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      z-index: -1;
      animation: steam 10s linear infinite;
    }

    .button:after {
      filter: blur(50px);
    }

    @keyframes steam {
      0% { background-position: 0 0; }
      50% { background-position: 400% 0; }
      100% { background-position: 0 0; }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #222;
      color: #fff;
      padding: 10px 0;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="button-container">
    <h3>FUSÉE-MD SESSION 3</h3>

    <a href="/qr" class="button" target="_blank">
      <span>QR-CODE</span>
    </a>

    <a href="/pair" class="button" target="_blank">
      <span>PAIRING-CODE</span>
    </a>

    <a href="https://github.com/WeedTech/FUS-E-MD/fork" class="button" target="_blank">
      <span>FORK FUS-E-MD</span>
    </a>

    <a href="https://whatsapp.com/channel/0029Vb2J9C91dAw7vxA75y2V" class="button" target="_blank">
      <span>WHATSAPP</span>
    </a>

    <p>FACE ANY ISSUES CLICK ERROR BUTTON</p>

    <a href="https://wa.me/+50939032060" class="button" target="_blank">
      <span>ERROR</span>
    </a>
  </div>

  <footer>
    bot name © <span id="currentYear"></span>
  </footer>

  <script>
    document.getElementById("currentYear").textContent = new Date().getFullYear();
  </script>

</body>
</html>
